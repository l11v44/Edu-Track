<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduTrack{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 h-full flex flex-col">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <a href="{% url 'home' %}" class="text-2xl font-black text-indigo-600 tracking-tighter">EduTrack</a>

            <div class="hidden md:flex items-center space-x-8">
                <a href="{% url 'course_list' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Explore Courses</a>
                <a href="{% url 'about' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">About</a>
                <a href="{% url 'manifesto' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Manifesto</a>
                <a href="{% url 'methodology' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Methodology</a>
                <a href="{% url 'security' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Security</a>
                <a href="{% url 'careers' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Careers</a>
                <a href="{% url 'investors' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Investors</a>
            </div>

            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <div class="relative group">
                        <button class="text-sm font-semibold text-gray-700 hover:text-indigo-600 focus:outline-none">
                            {{ user.username }}
                        </button>
                        <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                            <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Profile</a>

                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                    Sign Out
                                </button>
                            </form>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm font-semibold text-gray-600 hover:text-indigo-600 transition">Log In</a>
                    <a href="{% url 'signup' %}" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-indigo-700 transition shadow-md">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
    {% block content %}{% endblock %}
</main>

<footer class="py-8 text-center text-gray-400 text-sm">
    © 2026 EduTrack Platform.
</footer>

<script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
