<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 0.75rem; }
        p { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }

        /* Input styling */
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, ring 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Button styling */
        button {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2563eb; }

        /* Error styling */
        .error-list { color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Email Verification</h2>
        <p>We've sent a 6-digit code to your email. Please enter it below to continue.</p>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                {{ field }}
            {% endfor %}

            {% if form.errors %}
                <div class="error-list">
                    {% for field in form %}
                        {{ field.errors }}
                    {% endfor %}
                </div>
            {% endif %}

            <button type="submit">Verify Code</button>
        </form>
    </div>

</body>
</html>
