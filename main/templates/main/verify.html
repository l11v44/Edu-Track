<!DOCTYPE html>
<html>
<head>
    <title>Verify Email</title>
</head>
<body>
    <h2>Email Verification</h2>
    <p>We have sent a 6-digit code to your email. Please enter it below:</p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        {% if form.errors %}
            <div style="color: red;">
                {% for field in form %}
                    {{ field.errors }}
                {% endfor %}
            </div>
        {% endif %}

        <button type="submit">Verify</button>
    </form>
</body>
</html>
